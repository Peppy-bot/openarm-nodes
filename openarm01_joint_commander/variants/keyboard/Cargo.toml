[package]
name = "joint_commander"
version = "0.1.0"
edition = "2024"

# .peppy/libs/ is generated by `peppy node add .` — run it before `cargo build`.
[dependencies]
peppygen = { path = ".peppy/libs/peppygen" }
peppylib = { path = ".peppy/libs/peppylib" }
tokio     = { version = "1", features = ["full"] }
tracing   = "0.1"
serde     = { version = "1", features = ["derive"] }
serde_json = "1"
toml      = "0.8"
