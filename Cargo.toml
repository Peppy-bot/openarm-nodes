[workspace]
members = [
    "openarm01_backbone",
]
resolver = "2"

# peppylib is generated by the peppy toolchain (peppy node add).
# Path must point to any variant that has had `peppy node add` run on it.
[patch.crates-io]
peppylib = { path = "openarm01_backbone/variants/real/.peppy/libs/peppylib" }
